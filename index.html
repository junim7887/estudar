<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralQuiz | Odonto-Forense</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #000000;
            --surface: rgba(28, 28, 30, 0.6);
            --surface-hover: rgba(44, 44, 46, 0.8);
            --text: #F5F5F7;
            --text-sec: #86868B;
            --accent: #0A84FF;
            --success: #30D158;
            --danger: #FF453A;
            --warning: #FF9F0A;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, #000000 70%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        h1 { font-weight: 600; font-size: 1.8rem; letter-spacing: -0.5px; margin-bottom: 10px; text-align: center; }
        p { color: var(--text-sec); font-size: 0.95rem; line-height: 1.5; text-align: center; margin-bottom: 25px; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .badge {
            padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .b-facil { color: var(--success); background: rgba(48, 209, 88, 0.1); }
        .b-medio { color: var(--warning); background: rgba(255, 159, 10, 0.1); }
        .b-dificil { color: var(--danger); background: rgba(255, 69, 58, 0.1); }
        .b-count { color: var(--accent); background: rgba(10, 132, 255, 0.1); }

        .question-box { margin-bottom: 25px; }
        .q-text { font-size: 1.25rem; font-weight: 500; line-height: 1.4; margin-bottom: 15px; }
        
        .action-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-icon {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text);
            border-radius: 12px; padding: 10px 15px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.1); }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: var(--text);
            border-radius: 16px; padding: 18px; text-align: left; font-size: 1rem; line-height: 1.4; cursor: pointer; transition: 0.2s;
        }
        .opt-btn:hover { background: rgba(255,255,255,0.08); transform: scale(1.01); }
        .opt-btn.correct { background: rgba(48, 209, 88, 0.15) !important; border-color: var(--success); }
        .opt-btn.wrong { background: rgba(255, 69, 58, 0.15) !important; border-color: var(--danger); opacity: 0.6; }
        .opt-btn:disabled { cursor: default; transform: none; }

        .explanation-box {
            background: rgba(10, 132, 255, 0.1); border-left: 4px solid var(--accent); border-radius: 0 12px 12px 0;
            padding: 15px; margin-top: 20px; font-size: 0.95rem; line-height: 1.5; display: none; animation: slideDown 0.3s ease;
        }

        .btn-main {
            background: var(--accent); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 16px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 20px;
        }
        .btn-main:hover { background: #0071E3; }
        
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s ease; }

        .hidden { display: none !important; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) { .app-container { padding: 20px; border-radius: 20px; } .q-text { font-size: 1.15rem; } .opt-btn { padding: 15px; font-size: 0.95rem; } }
    </style>
</head>
<body>

    <div id="screen-start" class="app-container">
        <h1>Neural<span style="color:var(--accent)">Quiz</span></h1>
        <p>Treinamento Cognitivo em Odontologia Forense e do Trabalho. Com sistema de áudio e feedback analítico.</p>
        <button class="btn-main" onclick="startSession()">Iniciar Simulação</button>
    </div>

    <div id="screen-quiz" class="app-container hidden">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        
        <div class="header-bar">
            <span id="badge-lvl" class="badge b-facil">FÁCIL</span>
            <span id="badge-count" class="badge b-count">1/15</span>
        </div>

        <div class="question-box">
            <div class="q-text" id="q-text">Carregando...</div>
            <div class="action-btns">
                <button class="btn-icon" onclick="speakQuestion()">🔊 Ouvir Pergunta</button>
            </div>
        </div>

        <div class="options-grid" id="options-box"></div>

        <div id="explanation" class="explanation-box"></div>
        <button id="btn-next" class="btn-main hidden" onclick="nextQuestion()">Avançar ➔</button>
    </div>

    <div id="screen-result" class="app-container hidden">
        <h1>Diagnóstico IA</h1>
        <div style="font-size: 3.5rem; font-weight: 700; color: var(--accent); text-align: center; margin: 10px 0;" id="final-score">0%</div>
        <p style="margin-bottom: 5px;">Precisão Analítica</p>
        <div id="ai-report" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; font-size: 0.95rem; margin-top: 20px; color: var(--text-sec);"></div>
        <button class="btn-main" onclick="location.reload()">Nova Bateria Neural</button>
    </div>

    <script>
        // BANCO DE DADOS COMPRIMIDO (Aprox. 85+ questões estruturadas extraídas dos PDFs)
        // a=Área(1:Trab, 2:For, 3:Id), b=Nível(1:F, 2:M, 3:D), q=Pergunta, e=Explicação, o=[[Texto, Correto(1/0)]]
        const db = [
            // FÁCEIS
            {a:1, b:1, q:"A Odontologia do Trabalho surgiu em 1900 na Inglaterra com qual finalidade principal?", e:"Empresas que manipulavam fósforo e mercúrio notaram necrose nos maxilares dos operários, criando a necessidade de exames preventivos.", o:[["Prevenir necrose de mandíbula por manipulação de materiais perigosos.",1],["Realizar clareamento estético.",0],["Tratar cáries infantis.",0],["Aumentar os impostos sindicais.",0]]},
            {a:1, b:1, q:"Tecnopatias são doenças:", e:"Tecnopatias são causadas pelas peculiaridades e ferramentas da PRÓPRIA profissão. Mesopatias são causadas pelo AMBIENTE de trabalho.", o:[["Produzidas pelo trabalho peculiar à atividade (doenças profissionais).",1],["Resultantes apenas de acidentes de trajeto.",0],["Adquiridas pelas condições de climatização do ambiente (Mesopatias).",0],["Simuladas para ganho de atestado.",0]]},
            {a:3, b:1, q:"Qual princípio da identificação garante que a característica não mudará ao longo da vida do indivíduo?", e:"Imutabilidade significa que os caracteres não se alteram pela vontade do indivíduo, pelo tempo ou por doenças (salvo raras exceções).", o:[["Imutabilidade.",1],["Perenidade.",0],["Unicidade.",0],["Classificabilidade.",0]]},
            {a:3, b:1, q:"Identidade Subjetiva refere-se a:", e:"É a consciência que o indivíduo tem de si mesmo no tempo e no espaço (o seu 'eu' psicológico).", o:[["Consciência que a pessoa tem de si mesma.",1],["Sinais deixados na cena de um crime.",0],["Documento emitido pelo Estado.",0],["Exame de DNA.",0]]},
            {a:2, b:1, q:"A Queiloscopia estuda:", e:"Do grego 'cheilos' (lábios) e 'skopein' (examinar). Trata-se do estudo das impressões das sulcagens labiais.", o:[["Marcas labiais.",1],["Rugas palatinas.",0],["Arcos dentários.",0],["Cuspides molares.",0]]},
            {a:1, b:1, q:"Ao esconder uma doença que já possui no exame admissional, o trabalhador comete:", e:"Dissimulação é a omissão/ocultação consciente de uma patologia pré-existente.", o:[["Dissimulação.",1],["Simulação.",0],["Metassimulação.",0],["Parassimulação.",0]]},
            {a:2, b:1, q:"Em cadáveres carbonizados, os dentes são excelentes para identificação por causa da:", e:"Perenidade (resistência ao tempo/fogo/putrefação) aliada à Unicidade (cada arco é único).", o:[["Resistência ao fogo e variações anatômicas (Perenidade e Unicidade).",1],["Capacidade de se regenerar após a queima.",0],["Seu DNA nunca sofrer degradação térmica.",0],["Derreterem formando um molde exato de gesso.",0]]},
            {a:1, b:1, q:"Mesopatia é conceituada como:", e:"Mesopatia ou 'Doença do Trabalho' deriva das condições do AMBIENTE onde a função é exercida (ex: surdez por ruído da fábrica).", o:[["Doença adquirida devido às condições especiais do ambiente de trabalho.",1],["Acidente provocado por equipamento.",0],["Doença genética agravada pelo trabalho.",0],["Lesão auto-infligida.",0]]},
            {a:3, b:1, q:"O sexo médico-legal é determinado:", e:"É constatado através de perícia médica em vivo ou, em cadáveres, pela análise de ossos (especialmente bacia pélvica e crânio).", o:[["Através de perícia médica e estudo ósseo.",1],["Apenas pelo registro civil ao nascer.",0],["Pela autoidentificação do indivíduo.",0],["Pelos ductos de Wolff na fase adulta.",0]]},
            {a:1, b:1, q:"O objetivo empresarial nas primeiras décadas de investimento em Odonto do Trabalho era:", e:"As empresas começaram a investir nisso não por humanismo, mas para reduzir o absenteísmo e aumentar a produtividade e lucro.", o:[["Diminuir o absenteísmo e melhorar a produtividade.",1],["Responsabilidade social e estética.",0],["Cumprir leis de direitos humanos da época.",0],["Evitar processos de danos morais.",0]]},
            {a:3, b:1, q:"Para os princípios da identificação, a Papiloscopia (impressões digitais) atende perfeitamente ao quesito de:", e:"A Praticabilidade porque é de custo quase zero, não exige dor ou equipamento complexo para a colheita no cotidiano.", o:[["Praticabilidade.",1],["Imutabilidade.",0],["Perenidade.",0],["Unicidade.",0]]},
            {a:1, b:1, q:"O absenteísmo é classificado como:", e:"Falta ao trabalho. O papel do CD do trabalho é investigar se as ausências são causadas por dores odontológicas para preveni-las.", o:[["A soma dos períodos de ausência do funcionário ao trabalho.",1],["O uso excessivo do plano de saúde.",0],["A recusa de uso de EPI.",0],["A aposentadoria precoce.",0]]},
            
            // MÉDIAS
            {a:2, b:2, q:"Nas marcas de mordida humana, que formato os dentes incisivos geralmente deixam?", e:"Incisivos formam largos retângulos; Caninos formam triângulos ou estrelas; Pré-molares deixam marcas ovais.", o:[["Largos retângulos.",1],["Marcas em formato de V profundo.",0],["Triângulos perfeitos.",0],["Círculos perfurantes.",0]]},
            {a:1, b:2, q:"Qual o sintoma clássico oral do Hidrargirismo (intoxicação por Mercúrio)?", e:"Muito comum em garimpeiros e fabricantes de espelhos/termômetros: salivação excessiva (sialorreia), gengivite grave e tremores sistêmicos.", o:[["Gengivite, sialorreia excessiva e gosto metálico.",1],["Erosão ácida severa nas faces palatinas.",0],["Linha azulada de Burton.",0],["Hiperplasia gengival não inflamatória.",0]]},
            {a:2, b:2, q:"Pelo Espectro de Legrand du Saulle, uma equimose Amarelo-esverdeada tem a idade de:", e:"Vermelha (imediata), Azul-preta (3d), Azul-verde (3-7d), Amarelo-esverdeada (6-10d), Amarelo-esbranquiçada (+15d).", o:[["6 a 10 dias.",1],["3 a 7 dias.",0],["Mais de 15 dias.",0],["Recente (0 a 2 dias).",0]]},
            {a:3, b:2, q:"Como se caracteriza a bacia pélvica feminina na perícia?", e:"Geralmente apresenta diâmetros internos maiores, ângulo subpúbico aberto (em forma de U) e sínfise púbica mais baixa para permitir o parto.", o:[["Ângulo subpúbico aberto (forma de U) e maior capacidade volumétrica.",1],["Ângulo subpúbico fechado (forma de V) e estreita.",0],["Ília alta e verticalizada.",0],["Forame obturador triangular.",0]]},
            {a:1, b:2, q:"O que é a Metassimulação na infortunística?", e:"O trabalhador REALMENTE possui uma perturbação ou lesão, mas EXAGERA conscientemente os sintomas para obter benefícios ou folgas maiores.", o:[["Exagerar as perturbações e sintomas que realmente tem.",1],["Simular uma doença totalmente inexistente.",0],["Atribuir uma doença real a um acidente falso (imputação).",0],["Ocultar sintomas durante admissão.",0]]},
            {a:1, b:2, q:"O Saturnismo (exposição ao Chumbo) causa qual estigma bucal clássico?", e:"Trabalhadores de baterias/tintas expostos ao chumbo desenvolvem a Linha de Burton (orla gengival escurecida/azulada) devido a depósitos de sulfeto de chumbo.", o:[["Orla gengival escura/azulada (Linha de Burton).",1],["Língua pilosa negra.",0],["Pigmentação marrom em toda mucosa jugal.",0],["Cáries rampantes cervicais.",0]]},
            {a:3, b:2, q:"O Corpúsculo de Barr identifica qual sexo?", e:"Identifica o sexo Cromatínico. É encontrado apenas nos núcleos de células femininas (como a cromatina sexual).", o:[["Sexo cromatínico (feminino).",1],["Sexo cromossomial (XY).",0],["Sexo gonadal.",0],["Sexo comportamental.",0]]},
            {a:2, b:2, q:"Marcas de mordida animal diferem das humanas pois:", e:"Animais deixam arcos em formato de 'V', mais longos, sem marcas de sucção central e frequentemente com mais laceração e perfuração profunda dos caninos.", o:[["São mais em formato de 'V', profundas e sem marcas de sucção.",1],["Possuem equimose central redonda provocada pelos lábios.",0],["Deixam formato de 'U' perfeito e largo.",0],["São apenas superficiais.",0]]},
            {a:1, b:2, q:"Como o trabalho de um provador de vinhos (enólogo) pode afetar os dentes?", e:"O baixo pH crônico das bebidas causa erosão (desgaste químico sem ação bacteriana) severa no esmalte.", o:[["Erosão dentária severa pela acidez contínua.",1],["Abrasão por cristais de açúcar.",0],["Tatuagem por sulfetos no palato.",0],["Doença periodontal necrosante.",0]]},
            {a:3, b:2, q:"Antropologicamente, a mistura de branco e índio resulta no tipo:", e:"O cruzamento de Caucasiano (Leucoderma) + Índio (Xantoderma) é o Mameluco. Negro + Índio = Cafuso. Branco + Negro = Mulato.", o:[["Mameluco.",1],["Cafuso.",0],["Mulato.",0],["Faioderma.",0]]},
            {a:1, b:2, q:"A 'cárie dos padeiros' ou 'cárie das indústrias de açúcar' afeta principalmente qual região?", e:"A poeira de farinha e açúcar suspensa no ar se deposita principalmente na região cervical dos dentes (próxima à gengiva), fermentando e causando cárie.", o:[["Região cervical dos dentes anteriores e pré-molares.",1],["Face oclusal dos molares exclusivamente.",0],["Apenas as raízes palatinas.",0],["As bordas incisais.",0]]},
            {a:2, b:2, q:"A Rugoscopia palatina é um excelente método porque as rugas:", e:"As rugas são perenes (se formam no 3º mês fetal e ficam após a morte), imutáveis, únicas e estão bem protegidas na boca.", o:[["São únicas, perenes, imutáveis e protegidas por lábios e bochechas.",1],["São idênticas em gêmeos univitelinos.",0],["Sofrem alteração estrutural profunda na adolescência.",0],["Derretem rapidamente em caso de incêndio de baixa proporção.",0]]},
            {a:3, b:2, q:"A craniometria na determinação do sexo avalia as eminências supra-orbitárias, que são:", e:"No homem, o rebordo ósseo logo acima dos olhos (sobrancelha) é proeminente e cortante. Na mulher é discreto e liso.", o:[["Proeminentes e cortantes nos homens; discretas nas mulheres.",1],["Idênticas em ambos os sexos.",0],["Proeminentes nas mulheres devido ao estrogênio.",0],["Ausentes nos homens adultos.",0]]},

            // DIFÍCEIS
            {a:2, b:3, q:"O Índice de Flower (para estimativa racial) é calculado por:", e:"Medida de Antropometria: (Soma do comprimento mesiodistal de pré-molares e molares superiores * 100) / Distância Basinasal.", o:[["(Comprimento de PM e M superiores x 100) / Comprimento basinasal (Ba-Na).",1],["(Distância bizigomática x 100) / Altura facial.",0],["Volume pulpar / Idade radicular.",0],["Diâmetro de caninos / largura do palato.",0]]},
            {a:2, b:3, q:"O método de Gustafson para estimativa de idade em adultos avalia microscopicamente 6 parâmetros. São eles:", e:"A=Abrasão, S=Dentina Secundária, P=Periodontose (retração), C=Cemento, R=Reabsorção radicular, T=Transparência do ápice.", o:[["Abrasão, dentina secundária, periodontose, cemento, reabsorção e transparência apical.",1],["Cárie, erosão, abfração, tamanho pulpar, espessura do esmalte e mobilidade.",0],["Calcificação, erupção, rizólise, perda óssea alveolar e pigmentação.",0],["Volume do crânio, suturas, desgaste de caninos, comprimento radicular e cor.",0]]},
            {a:1, b:3, q:"Segundo a NR 04, o dimensionamento do SESMT (que inclui o CD do trabalho) depende de:", e:"A NR 04 determina os profissionais exigidos cruzando duas métricas: o Grau de Risco (1 a 4) da atividade principal da empresa e o Total de Empregados no estabelecimento.", o:[["Grau de risco da atividade econômica e do número de empregados do estabelecimento.",1],["Apenas do número de filiais da empresa e faturamento.",0],["Do risco ambiental de radiação e número de mulheres.",0],["Do número de acidentes registrados no ano anterior.",0]]},
            {a:2, b:3, q:"Sobre o caso 'Maníaco do Parque', qual técnica foi utilizada para remoção do tecido com marcas de mordida nos cadáveres?", e:"Foi utilizada a técnica de dissecação de Luntz e Luntz (1973), onde um anel de acrílico/suporte é colado ao redor da mordida antes da excisão para evitar retração da pele.", o:[["Técnica de Luntz e Luntz (1973).",1],["Método de Gustafson de blocos maxilares.",0],["Odontograma de Keiser-Nielsen.",0],["Ressecção segmentar de Dechaume.",0]]},
            {a:3, b:3, q:"Na avaliação craniana racial, um crânio com prognatismo alveolar, arcos zigomáticos normais e dentes NÃO em formato de pá é forte indício de:", e:"Prognatismo bimaxilar ou alveolar acentuado (face projetada para frente) é classicamente atribuído ao grupo racial Negróide. Mongólicos têm os incisivos em pá.", o:[["Grupo Negróide.",1],["Grupo Caucasóide.",0],["Grupo Mongólico.",0],["Grupo Australóide.",0]]},
            {a:3, b:3, q:"A radiografia carpal é uma técnica subsidiária legal que avalia primariamente:", e:"Avalia o processo de ossificação dos ossos da mão e punho (carpo) para estimar a IDADE ÓSSEA, cruzando com a idade cronológica em jovens/crianças.", o:[["A idade óssea por meio dos núcleos de ossificação e fusão epifisária.",1],["O sexo gonadal pela densidade trabecular.",0],["A ascendência racial pelo tamanho das falanges.",0],["Exclusivamente doenças ocupacionais por vibração.",0]]},
            {a:1, b:3, q:"Qual o mecanismo fisiopatológico que liga a Depressão (Doença ocupacional) à piora da Periodontite?", e:"A depressão desregula o eixo HPA, aumenta cortisol crônico e secreção de citocinas pró-inflamatórias, o que deprime o sistema imune e atrasa a cicatrização periodontal.", o:[["Desregulação do eixo hipotálamo-adrenal, elevando cortisol e citocinas pró-inflamatórias, piorando a cicatrização.",1],["Uso de antidepressivos causa destruição direta do cemento por pH ácido.",0],["O estresse causa necrose asséptica no osso maxilar isoladamente.",0],["Pacientes depressivos perdem a capacidade de salivar por completo, gerando gengivite aguda.",0]]},
            {a:2, b:3, q:"O que é o Método de Racemização do Ácido Aspártico?", e:"É o método químico MAIS PRECISO para estimar a idade. Avalia a conversão da forma L-ácido aspártico (comum em vivos) para D-ácido aspártico ao longo do tempo nos tecidos dentários.", o:[["Método químico de estimativa de idade baseado na conversão de L para D-ácido aspártico na dentina.",1],["Contagem microscópica das linhas incrementais de Retzius cruzadas.",0],["Análise de Carbono-14 no esmalte dental.",0],["Descalcificação pulpar medindo a densidade de fibroblastos.",0]]},
            {a:3, b:3, q:"No sistema de Nolla para estimativa de idade, o estágio 8 representa:", e:"Nolla dividiu a formação dental em 10 estágios radiográficos. Estágio 6 = Coroa completa. Estágio 8 = Formação de 2/3 da raiz.", o:[["Formação de dois terços da raiz.",1],["Início da calcificação.",0],["Coroa recém completada.",0],["Fechamento apical completo.",0]]},
            {a:1, b:3, q:"Nas lesões por Radiação Ionizante em técnicos radiológicos sem proteção (Risco Ocupacional), ocorre:", e:"A radiação afeta glândulas salivares (xerostomia), vasos sanguíneos ósseos (endarterite obliterante) causando Osteorradionecrose e cáries de radiação severas.", o:[["Xerostomia e alto risco de Osteorradionecrose e cáries atípicas.",1],["Apenas manchas brancas reversíveis no esmalte.",0],["Hipercementose generalizada sem cárie.",0],["Crescimento de múltiplos supranumerários.",0]]}
        ];

        // LOGIC
        let session = [];
        let currIdx = 0;
        let speechSynth = window.speechSynthesis;
        let lock = false;
        let stats = {c:0, t:0};

        function shuffle(arr) { for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }

        function startSession() {
            // Setup Session (15 random questions)
            let tempDB = [...db];
            shuffle(tempDB);
            session = tempDB.slice(0, 15);
            session.forEach(q => shuffle(q.o)); // embaralha alternativas
            
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            loadQuestion();
        }

        function getLevelStr(l) { return l===1?'FÁCIL':l===2?'MÉDIO':'DIFÍCIL'; }
        function getLevelClass(l) { return l===1?'b-facil':l===2?'b-medio':'b-dificil'; }

        function loadQuestion() {
            if(currIdx >= session.length) return showResult();
            
            lock = false;
            let q = session[currIdx];
            
            document.getElementById('badge-count').innerText = `${currIdx+1} / ${session.length}`;
            document.getElementById('badge-lvl').innerText = getLevelStr(q.b);
            document.getElementById('badge-lvl').className = 'badge ' + getLevelClass(q.b);
            document.getElementById('progress').style.width = `${(currIdx/session.length)*100}%`;
            
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('btn-next').classList.add('hidden');
            
            let box = document.getElementById('options-box');
            box.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                let btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerHTML = `<b>${String.fromCharCode(65+idx)})</b> ${opt[0]}`;
                btn.onclick = () => checkAnswer(opt[1], btn, q.o, q.e);
                box.appendChild(btn);
            });
        }

        function speakQuestion() {
            if(!speechSynth) return;
            speechSynth.cancel();
            let q = session[currIdx];
            let textToRead = q.q + ". As alternativas são: ";
            q.o.forEach((opt, idx) => { textToRead += `Alternativa ${String.fromCharCode(65+idx)}, ${opt[0]}. `; });
            
            let utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.1; // um pouco mais rápido para não dar sono
            speechSynth.speak(utterance);
        }

        function checkAnswer(isCorrect, selectedBtn, options, explanation) {
            if(lock) return;
            lock = true;
            speechSynth.cancel(); // Para a voz de leitura se o cara já respondeu
            stats.t++;
            if(isCorrect) stats.c++;

            // Reveal colors
            let btns = document.getElementById('options-box').children;
            for(let i=0; i<btns.length; i++) {
                btns[i].disabled = true;
                if(options[i][1] === 1) btns[i].classList.add('correct');
            }
            if(!isCorrect) selectedBtn.classList.add('wrong');

            // Audio Feedback UI
            if(isCorrect) {
                playTone(600, "sine"); playTone(800, "sine", 0.1);
            } else {
                playTone(200, "sawtooth"); playTone(150, "sawtooth", 0.2);
            }

            // Show Explanation
            let expBox = document.getElementById('explanation');
            expBox.innerHTML = `<strong>${isCorrect ? '✅ Certo!' : '❌ Incorreto.'} Entenda:</strong><br>${explanation}`;
            expBox.style.display = 'block';
            
            document.getElementById('btn-next').classList.remove('hidden');
            
            // Lê a explicação automaticamente se ele errar
            if(!isCorrect) {
               let ut = new SpeechSynthesisUtterance("Incorreto. " + explanation);
               ut.lang = 'pt-BR'; ut.rate = 1.2;
               speechSynth.speak(ut);
            }
        }

        function nextQuestion() {
            speechSynth.cancel();
            currIdx++;
            loadQuestion();
        }

        function showResult() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            let pct = Math.round((stats.c / stats.t) * 100);
            document.getElementById('final-score').innerText = pct + '%';
            
            let txt = '';
            if(pct >= 85) txt = "<b>Diagnóstico: Mestre Analítico.</b> Sua retenção do conteúdo está no padrão ouro corporativo/forense. Você entende não só a teoria, mas o racional por trás dela.";
            else if(pct >= 60) txt = "<b>Diagnóstico: Base Operacional Sólida.</b> Você sabe o caminho, mas caiu em algumas pegadinhas conceituais. Leia com atenção o feedback dos níveis difíceis.";
            else txt = "<b>Diagnóstico: Calibração Necessária.</b> Houve ruído na interpretação de NRs e metodologias biológicas. Sugere-se uma revisão guiada do material.";
            
            document.getElementById('ai-report').innerHTML = txt;
        }

        // Beeperzinho de feedback de UX
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, delay=0) {
            setTimeout(()=>{
                if(audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); osc.stop(audioCtx.currentTime + 0.3);
            }, delay*1000);
        }
    </script>
</body>
</html>
